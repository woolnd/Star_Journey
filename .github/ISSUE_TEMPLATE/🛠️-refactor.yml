name: "🛠️ Refactor"
description: "코드 리팩토링"
labels: ["Refactor"]
body:
  - type: textarea
    id: current-status
    attributes:
      label: "🧐 현재 상태 및 문제점"
      description: "어떤 부분의 코드를 왜 수정하려고 하시나요? (가독성, 중복, 복잡도 등)"
      placeholder: "예: ViewController에 네트워크 로직과 UI 로직이 섞여 있어 가독성이 떨어집니다."
    validations:
      required: true
  - type: textarea
    id: goal
    attributes:
      label: "🎯 리팩토링 목표"
      description: "어떤 방향으로 개선하고 싶으신가요?"
      placeholder: "예: MVVM 패턴을 도입하여 비즈니스 로직을 ViewModel로 분리하고 Combine을 적용합니다."
    validations:
      required: true
  - type: textarea
    id: tasks
    attributes:
      label: "✅ 작업 내용"
      description: "할 일을 체크박스 형태로 작성해주세요."
      placeholder: "최대한 세분화 해서 적어주세요!"
    validations:
      required: true
  - type: textarea
    id: impact
    attributes:
      label: "📈 기대 효과"
      description: "리팩토링 후에 어떤 점이 좋아질까요?"
      placeholder: "코드 가독성 향상, 유닛 테스트 가능, 유지보수 비용 감소 등"
  - type: textarea
    id: references
    attributes:
      label: "🙋🏻 참고 자료"
      description: "참고한 기술 문서나 디자인 패턴 링크가 있다면 작성해 주세요."
