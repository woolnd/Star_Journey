name: "🌎 Deploy"
description: "배포 관련"
labels: ["Deploy"]
body:
  - type: input
    id: version
    attributes:
      label: "🏷 배포 버전"
      description: "이번에 배포할 버전 정보를 입력해 주세요."
      placeholder: "예: v1.0.2 (Build 15)"
    validations:
      required: true
  - type: textarea
    id: release-summary
    attributes:
      label: "📝 주요 변경 사항 (Release Notes)"
      description: "이번 배포에 포함된 핵심 기능이나 수정 사항을 요약해 주세요."
      placeholder: "예: 소셜 로그인 오류 수정, 메인 화면 로딩 속도 개선 등"
    validations:
      required: true
  - type: textarea
    id: checklist
    attributes:
      label: "✅ 배포 전 체크리스트"
      description: "배포 전 반드시 확인해야 할 항목들입니다."
      value: |
        - [ ] 빌드 번호(Build Number) 업데이트 완료
        - [ ] 모든 단위 테스트(Unit Test) 통과
        - [ ] API 환경 설정 확인 (Development -> Production)
        - [ ] 시뮬레이터 및 실기기 최종 동작 확인
        - [ ] 스토어 제출용 스크린샷 및 메타데이터 준비 완료
  - type: textarea
    id: related-issues
    attributes:
      label: "🔗 관련 이슈"
      description: "이번 배포에 포함된 Feature나 Fix 이슈 번호(#)를 연결해 주세요."
      placeholder: "예: #12, #15, #18"
