name: "👾 Fix"
description: "버그 제보"
labels: ["Fix"]
body:
  - type: textarea
    id: bug-description
    attributes:
      label: "📌 버그 개요"
      description: "어떤 버그인지 짧고 명확하게 설명해 주세요."
      placeholder: "예: 로그인 버튼을 눌러도 반응이 없습니다."
    validations:
      required: true
  - type: textarea
    id: reproduction-steps
    attributes:
      label: "🛠 재현 경로"
      description: "버그를 똑같이 발생시키기 위한 순서를 적어주세요."
      value: |
        1. 
        2. 
        3. 
    validations:
      required: true
  - type: textarea
    id: expected-actual
    attributes:
      label: "🎯 기대 결과 vs 실제 결과"
      description: "원래 어떻게 작동해야 하는지, 현재는 어떻게 작동하는지 적어주세요."
      placeholder: "기대: 메인 화면으로 이동함 / 실제: 앱이 종료됨"
    validations:
      required: true
  - type: input
    id: environment
    attributes:
      label: "💻 테스트 환경"
      description: "문제가 발생한 기기와 OS 버전을 적어주세요. (iOS 개발 시 필수!)"
      placeholder: "예: iPhone 15 Pro (iOS 17.4) / Simulator"
    validations:
      required: true
  - type: textarea
    id: screenshots
    attributes:
      label: "📸 스크린샷 / 영상"
      description: "이미지나 영상을 드래그해서 넣어주시면 문제 파악이 훨씬 빠릅니다."
  - type: textarea
    id: references
    attributes:
      label: "🙋🏻 참고 자료"
      description: "관련된 이슈 번호(#)나 참고할 만한 링크, 로그 등을 적어주세요."
